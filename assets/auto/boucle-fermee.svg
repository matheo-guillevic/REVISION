<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" role="img" aria-labelledby="title desc">
  <title id="title">Boucle fermee avec retour unitaire et perturbation</title>
  <desc id="desc">Schema d'une boucle fermee avec consigne, regulateur, perturbation, processus et retour unitaire.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#172033"/>
    </marker>
    <style>
      .box{fill:#eef6ff;stroke:#1f5f99;stroke-width:2}
      .alt{fill:#f2fbf6;stroke:#23845a}
      .line{fill:none;stroke:#172033;stroke-width:2.2}
      .text{fill:#172033;font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:700}
      .small{fill:#667085;font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:700}
    </style>
  </defs>
  <circle cx="175" cy="118" r="24" fill="#ffffff" stroke="#172033" stroke-width="2"/>
  <text x="169" y="124" class="text">+</text>
  <text x="173" y="151" class="small">-</text>
  <rect x="260" y="78" width="140" height="80" rx="8" class="box alt"/>
  <rect x="500" y="78" width="150" height="80" rx="8" class="box"/>
  <circle cx="455" cy="118" r="20" fill="#ffffff" stroke="#172033" stroke-width="2"/>
  <text x="449" y="124" class="text">+</text>
  <path d="M80 118 H151" class="line" marker-end="url(#arrow)"/>
  <path d="M199 118 H250" class="line" marker-end="url(#arrow)"/>
  <path d="M400 118 H435" class="line" marker-end="url(#arrow)"/>
  <path d="M475 118 H490" class="line" marker-end="url(#arrow)"/>
  <path d="M650 118 H790" class="line" marker-end="url(#arrow)"/>
  <path d="M455 38 V96" class="line" marker-end="url(#arrow)"/>
  <path d="M720 118 V220 H175 V145" class="line" marker-end="url(#arrow)"/>
  <text x="92" y="99" class="text">c(t)</text>
  <text x="300" y="108" class="text">R(p)</text>
  <text x="286" y="132" class="small">regulateur</text>
  <text x="552" y="108" class="text">P(p)</text>
  <text x="535" y="132" class="small">processus</text>
  <text x="798" y="112" class="text">y(t)</text>
  <text x="472" y="48" class="text">d(t)</text>
  <text x="204" y="214" class="small">retour unitaire : la mesure est comparee a la consigne</text>
</svg>
