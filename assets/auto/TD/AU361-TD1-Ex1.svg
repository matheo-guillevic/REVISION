<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000" />
    </marker>
  </defs>

  <text x="10" y="105" font-family="Arial" font-size="14">cn(t)</text>
  <line x1="45" y1="100" x2="90" y2="100" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />

  <circle cx="100" cy="100" r="10" stroke="#000" stroke-width="2" fill="none" />
  <text x="85" y="90" font-family="Arial" font-size="12">+</text>
  <text x="105" y="125" font-family="Arial" font-size="12">-</text>

  <line x1="110" y1="100" x2="140" y2="100" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="140" y="80" width="60" height="40" stroke="#000" stroke-width="2" fill="#f9f9f9" />
  <text x="155" y="105" font-family="Arial" font-size="14">R (K)</text>

  <line x1="200" y1="100" x2="240" y2="100" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <text x="210" y="90" font-family="Arial" font-size="12">qe(t)</text>
  <rect x="240" y="80" width="80" height="40" stroke="#000" stroke-width="2" fill="#e6f7ff" />
  <text x="265" y="105" font-family="Arial" font-size="14">H(p)</text>

  <text x="350" y="45" font-family="Arial" font-size="14">δ1(t) / qs(t)</text>
  <line x1="360" y1="50" x2="360" y2="80" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  
  <circle cx="360" cy="100" r="10" stroke="#000" stroke-width="2" fill="none" />
  <text x="345" y="90" font-family="Arial" font-size="12">+</text>
  <text x="365" y="125" font-family="Arial" font-size="12">-</text>
  <line x1="320" y1="100" x2="350" y2="100" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />

  <line x1="370" y1="100" x2="450" y2="100" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <text x="460" y="105" font-family="Arial" font-size="14">y(t) = n(t)</text>

  <line x1="420" y1="100" x2="420" y2="160" stroke="#000" stroke-width="2" />
  <line x1="420" y1="160" x2="100" y2="160" stroke="#000" stroke-width="2" />
  <line x1="100" y1="160" x2="100" y2="110" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
</svg>
