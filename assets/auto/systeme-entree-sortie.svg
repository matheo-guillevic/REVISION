<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 210" role="img" aria-labelledby="title desc">
  <title id="title">Representation generale d'un systeme automatique</title>
  <desc id="desc">Une entree de commande u(t), une perturbation d(t), un processus H(p) et une sortie y(t).</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#172033"/>
    </marker>
    <style>
      .box{fill:#eef6ff;stroke:#1f5f99;stroke-width:2}
      .line{fill:none;stroke:#172033;stroke-width:2.2}
      .text{fill:#172033;font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:700}
      .small{fill:#667085;font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:700}
    </style>
  </defs>
  <rect x="310" y="64" width="210" height="86" rx="8" class="box"/>
  <text x="415" y="98" text-anchor="middle" class="text">Processus</text>
  <text x="415" y="124" text-anchor="middle" class="small">H(p)</text>
  <path d="M90 107 H300" class="line" marker-end="url(#arrow)"/>
  <path d="M520 107 H760" class="line" marker-end="url(#arrow)"/>
  <path d="M415 24 V58" class="line" marker-end="url(#arrow)"/>
  <text x="92" y="88" class="text">u(t)</text>
  <text x="92" y="128" class="small">entree de commande</text>
  <text x="768" y="100" class="text">y(t)</text>
  <text x="768" y="122" class="small">sortie mesuree</text>
  <text x="430" y="32" class="text">d(t)</text>
  <text x="470" y="32" class="small">perturbation</text>
</svg>
