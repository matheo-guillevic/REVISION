<svg xmlns="http://www.w3.org/2000/svg" width="980" height="390" viewBox="0 0 980 390" role="img" aria-labelledby="title desc">
  <title id="title">Signaux de sortie de l'amplificateur de puissance</title>
  <desc id="desc">Trace qualitatif de v2 triangulaire entre -3 V et +3 V, et de VBM decale de 0,7 V selon le transistor conducteur.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#172033"/>
    </marker>
  </defs>
  <rect width="980" height="390" fill="#ffffff"/>
  <g font-family="Inter, Arial, sans-serif" fill="#172033">
    <text x="34" y="34" font-size="19" font-weight="700">Trace qualitatif : \(v_2(t)\) et \(V_{BM}(t)\)</text>
    <line x1="95" y1="190" x2="905" y2="190" stroke="#172033" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="120" y1="330" x2="120" y2="62" stroke="#172033" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="912" y="196" font-size="14">t</text>
    <text x="88" y="68" font-size="14">V</text>
    <g stroke="#d9dee8" stroke-width="1">
      <line x1="120" y1="90" x2="900" y2="90"/>
      <line x1="120" y1="170" x2="900" y2="170"/>
      <line x1="120" y1="210" x2="900" y2="210"/>
      <line x1="120" y1="290" x2="900" y2="290"/>
      <line x1="315" y1="70" x2="315" y2="330"/>
      <line x1="510" y1="70" x2="510" y2="330"/>
      <line x1="705" y1="70" x2="705" y2="330"/>
    </g>
    <text x="58" y="95" font-size="13">+3,7 V</text>
    <text x="70" y="175" font-size="13">+3 V</text>
    <text x="77" y="195" font-size="13">0</text>
    <text x="74" y="215" font-size="13">-3 V</text>
    <text x="58" y="295" font-size="13">-3,7 V</text>
    <polyline points="120,190 315,170 510,190 705,210 900,190" fill="none" stroke="#1f5f99" stroke-width="4"/>
    <polyline points="120,90 315,90 315,170 510,90 510,290 705,210 900,290" fill="none" stroke="#c87b16" stroke-width="4"/>
    <text x="735" y="160" fill="#1f5f99" font-size="15" font-weight="700">\(v_2(t)\), triangle ±3 V</text>
    <text x="650" y="312" fill="#c87b16" font-size="15" font-weight="700">\(V_{BM}=v_2\pm0,7\text{ V}\)</text>
    <text x="160" y="116" fill="#c87b16" font-size="13">T1 conduit : \(V_{BM}=v_2+0,7\)</text>
    <text x="535" y="270" fill="#c87b16" font-size="13">T2 conduit : \(V_{BM}=v_2-0,7\)</text>
  </g>
</svg>
