<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="360" viewBox="0 0 1080 360" role="img" aria-labelledby="title desc">
  <title id="title">Chronogramme PWM de l'examen VHDL 4</title>
  <desc id="desc">Simulation du compteur r avec w egal a 3 puis 6, et impulsion pulse haute pendant w cycles.</desc>
  <rect width="1080" height="360" fill="#ffffff"/>
