<svg xmlns="http://www.w3.org/2000/svg" width="980" height="330" viewBox="0 0 980 330" role="img" aria-labelledby="title desc">
  <title id="title">Chronogramme de la FSM de Moore</title>
  <desc id="desc">La sortie Y monte pendant deux cycles apres detection synchrone du front montant de X.</desc>
