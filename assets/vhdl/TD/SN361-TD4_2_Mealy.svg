<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%">
  <circle cx="100" cy="100" r="30" fill="white" stroke="black" stroke-width="2"/>
  <text x="100" y="105" font-family="Arial" font-size="16" text-anchor="middle">S0</text>

  <circle cx="300" cy="100" r="30" fill="white" stroke="black" stroke-width="2"/>
  <text x="300" y="105" font-family="Arial" font-size="16" text-anchor="middle">S1</text>

  <line x1="20" y1="40" x2="80" y2="80" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="10" y="30" font-family="Arial" font-size="12">reset = 1</text>

  <path d="M 125 80 Q 200 50 275 80" fill="transparent" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="45" font-family="Arial" font-size="14" text-anchor="middle">t = 1 / q = 0</text>

  <path d="M 275 120 Q 200 150 125 120" fill="transparent" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="165" font-family="Arial" font-size="14" text-anchor="middle">t = 1 / q = 1</text>

  <path d="M 75 80 C 50 30, 10 90, 70 110" fill="transparent" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="40" y="40" font-family="Arial" font-size="14" text-anchor="middle">t=0/q=0</text>

  <path d="M 325 80 C 350 30, 390 90, 330 110" fill="transparent" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="360" y="40" font-family="Arial" font-size="14" text-anchor="middle">t=0/q=1</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="black" />
    </marker>
  </defs>
</svg>
