<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#333" />
        </marker>
        <marker id="arrow-back" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#d9534f" />
        </marker>
        <style>
            .state { fill: #f8f9fa; stroke: #333; stroke-width: 2.5; }
            .state-success { fill: #e3f2fd; stroke: #0055aa; stroke-width: 2.5; }
            .state-text { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; text-anchor: middle; }
            .state-sub { font-family: Arial, sans-serif; font-size: 14px; fill: #555; text-anchor: middle; }
            .line-fwd { fill: none; stroke: #333; stroke-width: 2; }
            .line-bwd { fill: none; stroke: #d9534f; stroke-width: 1.5; stroke-dasharray: 4; }
            .label-fwd { font-family: monospace; font-size: 16px; font-weight: bold; fill: #0055aa; text-anchor: middle; }
            .label-bwd { font-family: monospace; font-size: 13px; fill: #d9534f; text-anchor: middle; }
            .label-loop { font-family: monospace; font-size: 14px; fill: #28a745; text-anchor: middle; }
        </style>
    </defs>

    <rect width="100%" height="100%" fill="white" />

    <text x="500" y="40" font-family="Arial" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">Détecteur de séquence (abc = 111 temporellement) - Machine de Moore</text>

    <circle cx="150" cy="200" r="50" class="state" />
    <text x="150" y="195" class="state-text">S0</text>
    <text x="150" y="215" class="state-sub">x = 0</text>

    <circle cx="380" cy="200" r="50" class="state" />
    <text x="380" y="195" class="state-text">S1</text>
    <text x="380" y="215" class="state-sub">x = 0</text>

    <circle cx="610" cy="200" r="50" class="state" />
    <text x="610" y="195" class="state-text">S2</text>
    <text x="610" y="215" class="state-sub">x = 0</text>

    <circle cx="840" cy="200" r="50" class="state-success" />
    <circle cx="840" cy="200" r="42" fill="none" stroke="#0055aa" stroke-width="1.5" />
    <text x="840" y="195" class="state-text">S3</text>
    <text x="840" y="215" class="state-sub">x = 1</text>

    <path d="M 50,200 L 95,200" class="line-fwd" marker-end="url(#arrow)" />
    <text x="75" y="190" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">rst</text>

    <path d="M 200,200 L 325,200" class="line-fwd" marker-end="url(#arrow)" />
    <text x="262" y="190" class="label-fwd">abc=100</text>

    <path d="M 430,200 L 555,200" class="line-fwd" marker-end="url(#arrow)" />
    <text x="492" y="190" class="label-fwd">abc=110</text>

    <path d="M 660,200 L 785,200" class="line-fwd" marker-end="url(#arrow)" />
    <text x="722" y="190" class="label-fwd">abc=111</text>

    <path d="M 130,154 C 110,80 190,80 170,154" class="line-fwd" marker-end="url(#arrow)" />
    <text x="150" y="80" class="label-loop">autres</text>

    <path d="M 360,154 C 340,80 420,80 400,154" class="line-fwd" marker-end="url(#arrow)" />
    <text x="380" y="80" class="label-loop">abc=100</text>

    <path d="M 590,154 C 570,80 650,80 630,154" class="line-fwd" marker-end="url(#arrow)" />
    <text x="610" y="80" class="label-loop">abc=110</text>

    <path d="M 820,154 C 800,80 880,80 860,154" class="line-fwd" marker-end="url(#arrow)" />
    <text x="840" y="80" class="label-loop">abc=111</text>


    <path d="M 810,240 Q 725,280 640,240" class="line-bwd" marker-end="url(#arrow-back)" />
    <text x="725" y="280" class="label-bwd">abc=110</text>

    <path d="M 820,245 Q 600,340 400,245" class="line-bwd" marker-end="url(#arrow-back)" />
    <text x="600" y="315" class="label-bwd">abc=100</text>
    
    <path d="M 830,250 Q 500,430 160,250" class="line-bwd" marker-end="url(#arrow-back)" />
    <text x="500" y="380" class="label-bwd">autres</text>

    <path d="M 580,240 Q 495,280 410,240" class="line-bwd" marker-end="url(#arrow-back)" />
    <text x="495" y="275" class="label-bwd">abc=100</text>

    <path d="M 590,245 Q 370,340 170,245" class="line-bwd" marker-end="url(#arrow-back)" />
    <text x="370" y="315" class="label-bwd">autres</text>

    <path d="M 350,230 Q 265,260 180,230" class="line-bwd" marker-end="url(#arrow-back)" />
    <text x="265" y="265" class="label-bwd">autres</text>

</svg>
